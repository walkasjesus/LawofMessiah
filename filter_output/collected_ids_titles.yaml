  commentary_rudolph: The key Scripture supporting this Mitzvah is Yeshua's rebuke to the Torah teachers and Pharisees of his time for portraying themselves as righteous by meticulously complying with minor Torah requirements that others could observe them doing, while disregarding weightier requirements of the Torah (e.g. justice, mercy, trust, justice, love, etc.), violations that they could keep hidden. It is a lesson to us that Torah is not to be pursued by observable self-sacrifice and rule-keeping, but rather by searching the depths of God's heart for how He wants us to mirror His image in relating to Him and to our fellow man.
