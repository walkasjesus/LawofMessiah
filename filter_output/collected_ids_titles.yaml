  - id: BA39D
    commandment: We are to receive Yeshua’s kindness and blessings
  commentary_rudolph: 'Acts of kindness and blessings are synonymous; they are acts of benevolence performed on behalf of another, often not deserved. It is especially true of the kindness that God has shown and continues to show toward us, given the many times that we have sinned against him. There is no greater blessing of God and Yeshua than the one spoken of in John 3:16-17: "For God so loved the world that he gave his only and unique Son, so that everyone who trusts in him may have eternal life, instead of being utterly destroyed. For God did not send the Son into the world to judge the world, but rather so that through him, the world might be saved.” This is especially impactful when one considers that God sent his sonYeshua into the world to give his life for sins we committed and for which we (not he) deserved to die. Even so, Yeshua in his immense compassion beckoned to us in Matthew 11:28-30: "Come to me, all of you who are struggling and burdened, and I will give you rest. Take
    my yoke upon you and learn from me, because I am gentle and humble in heart, and you will find rest for your souls. For my yoke is easy, and my burden is light."'
