- id: DA14
  title: Submitting to One Another
  commandment: We are to submit to one another as we are led by the Holy Spirit.
  commandment_subtitles: []
  commentary_rudolph: “Submitting to one another” means subordinating our desires (and sometimes even our welfare) to the needs and welfare of another; it is a term that means putting another before our self. Submitting to God and Messiah must be total and unconditional, but our submitting to one another per this Mitzvah has its biblical and godly limits. Do we comply with the demand of another that we procure something for him illegally? Of course not. Do we risk our life to save the life of another? Sometimes yes and sometimes no. Each situation in which we are called to give something of ourselves for another calls for wisdom that can only reliably be acquired from the Holy Spirit. The examples I gave are extreme; more often we are called to submit to others with our love, our compassion, our time, our money, and sometimes our property – sacrificial, nevertheless. There are no criteria for deciding whether to, or how much to, but Ephesians 5:21 in the CJB says that we are to submit to
    one another “in fear of the Messiah” (the NKJ version says “in the fear of God”). The word “fear,” as used here, means in compliance with God’s will – hence the need for us to pray to God and be directed by the Holy Spirit.
  commentary_juster: ''
