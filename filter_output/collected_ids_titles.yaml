- id: DA7
  title: Being Sensitive to Each Other’s Needs
  commandment: We are to be sensitive to each other’s needs.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah and Mitzvot #BB1 to BB11 are related in their all having to do with providing for and helping with each other’s needs. Complying with this Mitzvah comes before the others, however, because one must be sensitive to recognize another’s need before one can even consider helping. There are, however, some needs that do not require much or any sensitivity because we are commanded to be proactive in providing for them. One such example is Mitzvah #BB7: “Supporting Our Family Financially.” One does not need much sensitivity to observe that our family is unfed, unclothed, or unsheltered. On the other hand, a similar need of our brother or neighbor may not be that obvious. Being sensitive to another’s needs is inextricably related to Mitzvah #AA10: “Having Godly Compassion” because our sensitivity does no good if our compassion (derived from our faith) does not cause us to help. This is exemplified in James 2:15-16: “Suppose a brother or sister is without clothes
    and daily food, and someone says to him, "Shalom! Keep warm and eat hearty!" without giving him what he needs, what good does it do?”'
