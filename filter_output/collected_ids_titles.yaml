- id: DA31
  title: Not Hating Our Brother
  commandment: We are not to hate our brother.
  commandment_subtitles: []
  commentary_rudolph: 'Hate is the opposite of love, and Matthew 22:39 and other Scriptures command us to “love your neighbor as ourself,” i.e. everyone. But this Mitzvah speaks only of our not hating our brother, so who then is our brother? Mark 3:35 says: “Whoever does what God wants is my brother, sister and mother!" and Hebrews 13:1-2 says: “Let brotherly friendship continue; but don''t forget to be friendly to outsiders; for in so doing, some people, without knowing it, have entertained angels.” Also, 1 John 3:1 says: “See what love the Father has lavished on us in letting us be called God''s children! For that is what we are. The reason the world does not know us is that it has not known him.” The inference of these Scriptures is that our brother is only he (or she) who is a believer and follower of Yeshua (or least a believer and follower of God). On the other hand, Proverbs 14:21 : “He who despises his fellow sins, but he who shows compassion to the humble is happy.” The word in
    Hebrew translated “fellow” is so broad as to include our neighbor, regardless of our neighbor’s belief in God or Yeshua, and the word in Hebrew translated “despises” is similar to the word “hates.” It is because of this Scripture and the commandment to “love your neighbor” that I consider “brother” (in this Mitzvah ) to mean “fellow human being.”'
