- id: BA51
  title: Knowing Yeshua as the One Mediator Between God and Man
  commandment: We are to know Yeshua as the One Mediator between God and Man.
  commandment_subtitles: []
  commentary_rudolph: A mediator is someone who brings two parties together into agreement. Before their expulsion from the Garden of Eden, Adam and Eve did not need a mediator to converse with God because God and they were in close covenantal relationship. However, as a consequence of Adam’s breach of covenant, humanity became more distant from God so, whereas God could speak directly to whomever He wished, most men had to communicate through a priestly mediator of God’s choosing. God’s covenant with men changed several times over the years as God graciously sought to bring men closer to him. To assist, He selected priests to serve him – priests such as Abraham, Moses, Aaron, David, and many others. The priesthood of Aaron we know about, but we do not usually think of Abraham, Moses, and David as being priests; yet they were because they fulfilled the priestly role of representing mankind to God and God to mankind. We read in Jeremiah 31 that when the Israelites violated their Covenant
    with God, God mercifully saw fit to give them a New and better Covenant, whereby God’s own son Yeshua came to earth, became High Priest and, with the assistance of the Holy Spirit, became the “one [and only] Mediator between God and humanity” ( 1 Timothy 2:5) .
  commentary_juster: ''
