- id: BA28
  title: Believing that Yeshua Died for Our Sins
  commandment: We are to believe that Yeshua died for our sins.
  commandment_subtitles: []
  commentary_rudolph: The need for us to offer a blood sacrifice to atone for our sins is a requirement established by God. Under the Mosaic Covenant, the sacrifice was of animals brought to the Tabernacle, and later the Temple, and was assisted by Levitical Priests. In addition to daily sacrifices for the sins of individuals, there was an annual sacrifice of two goats to atone for the sins of the Nation; both kinds of sacrifices had to be repeated day after day and year after year. We read in Jeremiah 31:30(31)-33(34) and Hebrews 8:6-12 that Israel violated God’s covenant and, instead of punishing Israel, God promised them a new and better covenant based on better promises. We now know that the better promises are that we no longer have to sacrifice animals each time we commit sin. Instead, God sent his Son Yeshua to earth as a man to be a once-and-for-all- time sacrifice, so that whosoever of us receive him as our Messiah and repent of our sins are forgiven. We still have to repent each
    time we sin, but we do not have to repeatedly sacrifice so long as we remain in a faith relationship with Yeshua.
  commentary_juster: ''
