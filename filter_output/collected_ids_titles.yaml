- id: BA58
  title: Standing Firm in Union with the Lord
  commandment: We are to stand firm in union with the Lord.
  commandment_subtitles: []
  commentary_rudolph: When we receive Yeshua as Lord, we come into a union relationship with him and with God the Father through him; this is known as being “born again” ( John 3:3-5 ; 1 Peter 1:23) . So, why does Scripture find it necessary to remind us to stand firm in that union? Does God expect that we will backslide into sin and unbelief? The short answer is that God does not expect it but knows it is possible because He has seen it happen before. Adam and Eve were in a close union relationship with God, and yet they gave in to believing what Satan said over what God said. Scripture is replete with warnings to look out for Satanic attacks through false prophets and temptations of our flesh because, when we become “born again,” we become targets for Satan to try to do to us what he did to Adam. That’s the bad news. The good news is that through our relationship with Yeshua, we have the Holy Spirit to help us fight off temptations of the flesh. Still, as with Adam, we have free will to
    not do so, and that is why there are so many admonitions that we stand firm in union with Yeshua.
  commentary_juster: ''
