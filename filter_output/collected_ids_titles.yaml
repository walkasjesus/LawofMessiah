  title: Not Pursuing and Accumulating Worldly Wealth & Possessions
  commandment: We are not to pursue and accumulate worldly wealth and possessions.
  commandment_subtitles:
  - id: CA1A
    commandment: We are not to pursue worldly wealth
  - id: CA1B
    commandment: We are not to pursue worldly possessions
  - id: CA1C
