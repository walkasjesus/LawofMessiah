- id: AA32
  title: Being Faithful, Trustworthy and Loyal
  commandment: We are to be faithful, trustworthy, and loyal.
  commandment_subtitles:
  - id: AA32A
    commandment: We are to be faithful
  - id: AA32B
    commandment: We are to be trustworthy
  - id: AA32C
    commandment: We are to be loyal
  commentary_rudolph: Faithfulness is the quality of being dependable in one’s attemp to carry out a task or duty. Trustworthiness is similar but includes assurance that the person one trusts will not veer from the given task through lack of wisdom or temptation and that the means he or she chooses to carry out the task will be the best or at least appropriate. Loyalty (also fidelity) is maintaining devoted attachment to a person, task or principle and the assurance that one cannot not be lured to another. Faithfulness, trustworthiness and loyalty are grouped herein into a single Mitzvah because a person cannot be one of them without also being the other two. Faithfulness, trustworthiness, and loyalty are virtues only so long as the people, entities, or principles to which they are applied are themselves virtuous or at least one believes them to be virtuous. Their application in the Bible and in this Mitzvah is to God, Yeshua, and to brother believers, and unless they are said to be otherwise,
    they are considered virtues in all biblical contexts.
  commentary_juster: ''
