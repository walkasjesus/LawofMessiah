- id: BA1
  title: Not Testing or Tempting God, the Holy Spirit, or Yeshua
  commandment: We are not to test or tempt God, the Holy Spirit, or Yeshua.
  commandment_subtitles:
  - id: BA1A
    commandment: We are not to test or tempt God
  - id: BA1B
    commandment: We are not to test or tempt the Holy Spirit
  - id: BA1C
    commandment: We are not to test or tempt Yeshua
  commentary_rudolph: 'A question that is sometimes asked is: “What is the difference between ‘testing’ and tempting?’ The answer is that “tempting” is intentionally luring and desiring a person to do something he would not ordinarily do (e.g committing sin), while “testing” makes available to a person the opportunity to do something in order to find out whether he will do it. The two are connected when God tests us through trials ( James 1:2-4 & 12) or by allowing Satan (through our flesh) to tempt us ( James 1:13-14) . We also read in Genesis 3:1-6 of how Satan successfully tempted Eve, and in Matthew 4:1-11 of how he tried (unsuccessfully) to tempt Yeshua. But Scripture (as reflected in this Mitzvah ) commands us not to test God (including Yeshua and the Holy Spirit); why is it wrong to test God? It is wrong because God has revealed Himself and His will for us in Scripture; putting God to the test is therefore saying that we do not believe the Scriptures or that we do not believe God.
    Why do men sometimes test God? Mostly to determine the limits of sin they can commit without being punished. They typically do it by committing a sin they desire to commit and then wait for God to respond. If they receive no immediate response, they become emboldened, believing that they can repeat the sin with impunity. Note: An apparent exception is Malachi 3:10 in which God invites being tested: 3 “Bring the whole tenth into the storehouse, so that there will be food in my house, and put me to the test," says ADONAI-Tzva''ot. "See if I won''t open for you the floodgates of heaven and pour out for you a blessing far beyond your needs.”'
