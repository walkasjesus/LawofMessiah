  commandment: We are to be good stewards of the things and matters that are entrusted to us.
  commandment_type: Positive
  commentary_rudolph: A steward is someone who cares for things, and "stewardship" is the conducting, overseeing, or managing of things. The "things" may be tangible property, or intangible items such as time, knowledge, skill, etc. The diverse Scriptures presented are representative of others and make a strong case for God wanting us to be good stewards of the things He has entrusted to us. They may belong to others, to God, or even to ourselves, but whether big or small, God holds us accountable for those with which we have been entrusted.
  classical_commentators: This Mitzvah is not addressed by any of the classical commentators.
