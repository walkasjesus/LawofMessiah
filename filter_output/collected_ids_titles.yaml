- id: BA44
  title: Relying on God
  commandment: We are to rely on God.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah is one of the most useful and profound of all the commandments given us by God. It speaks to circumstances where we have no human control over a situation, and we dread an adverse result. Our response in the natural is to become depressed and to comport ourselves in ways that are unwise, unhelpful, and possibly even harmful. In short, we allow our quality of life to diminish, and all because we have disregarded this Mitzvah .to rely on God. Yes, we should fervently pray for God to intervene in our behalf, but more than that! We must place ourselves, our loved ones and all we possess and hold dear in his care, and trust in him. Notice I did not say “trust that the result will be to our liking.” We can pray for a particular outcome, but our faith must be for God’s will to be done. If we allow it to be so, He will lift us above all our cares and we will have the shalom of God that “surpasses all understanding.” ( Philippians 4:6-7) . There is a Christian
    poem and hymn titled “What a Friend We Have in Jesus” 11 that says it perfectly; the words are: What a friend we have in Jesus, All our sins and griefs to bear. And what a privilege to carry, Everything to God in prayer. Oh, what peace we often forfeit, Oh, what needless pain we bear. All because we do not carry, Everything to God in prayer. Have we trials and temptations? Is there trouble anywhere? We should never be discouraged, Take it to the Lord in prayer.'
