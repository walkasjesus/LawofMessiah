- id: DA1
  title: Speedily Seeking Reconciliation when Summoned to Court
  commandment: We are to speedily seek reconciliation when summoned to court.
  commandment_subtitles: []
  commentary_rudolph: 'Two things should be clear about this Mitzvah (and its supporting Scriptures Matthew 5:25 and Luke 12:58-59 ): (1) It assumes that we are likely wrong about whatever we are accused of; and (2) it instructs us to try to settle a grievance before appearing in court and without compromising biblical principles or values. We believe that, during the First Century, the Romans allowed Jewish courts ( betei din ) to adjudicate private disputes between Jews. An accommodation such as that does not exist between our secular courts and religious institutions today, yet 1 Corinthians 6:1-7 is clear that if a person suing us is a brother believer, he should not be doing so in a secular court. He could, however, do so in an ecclesiastical court ( beit din ), so it is important that believing congregations today (both Jewish and Christian) establish tribunals to adjudicate disputes and settle controversies that arise in their midst. Also, the Scriptures underlying this Mitzvah seem
    to assume that we were wrong in whatever we are accused of because (they say) that if the matter goes to court, it is likely that we will be “thrown into jail.” The Mitzvah is therefore calling us to try to settle our differences, but without compromising biblical values because (1) compromising biblical values is forbidden by Scripture (i.e., Deuteronomy 5:29(32 ), and (2) because, the party who has done something wrong, is required to repent and, if possible, make full restitution. Subjects related to this Mitzvah (treated elsewhere in this compilation) are loving our neighbor, not sinning against our neighbor, forgiving our neighbor, repenting of sin, and making restitution when we do sin. Also, most of the Scriptures in the Bible about disputes are about disputes between believers, two of the most important being Matthew 5:23-24 and Matthew 18:15-17.'
