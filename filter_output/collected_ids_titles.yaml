  commandment: We are not to despise our neighbor.
  commandment_type: Negative
  commentary_rudolph: 'The natural un-regenerated man elevates himself and therefore despises his neighbors who are not like he is. We sometimes justify despising a person because he is our enemy or because of his sin. Scripture, on the other hand, calls us to despise a person''s sin while having love and compassion for the person himself: Jude 1:21-23 : Thus keep yourselves in God''s love, as you wait for our Lord Yeshua the Messiah to give you the mercy that leads to eternal life. Rebuke some who are disputing; save others, snatching them out of the fire; and to yet others, show mercy, but with fear, hating even the clothes stained by their vices.'
