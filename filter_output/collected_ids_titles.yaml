- id: DA20
  title: Not Being Envious, Jealous, or Covetous of Our Neighbor
  commandment: We are not to be envious, jealous, or covetous of our neighbor.
  commandment_subtitles: []
  commentary_rudolph: 'Envy, jealousy, and covetousness are in some ways the same and in some ways different. All three are the result of dissatisfaction, are triggered by comparing ourselves with others, and are desirous of things that others have that we do not. Typical of such things are physical appearance, status, wealth, possessions, abilities, relationships, privileges, one’s spouse, and many others. The way in which envy and jealousy are different is the “loudness” with which they are expressed. Envy is more of a quiet discontentment that begrudgingly craves something possessed by another, whereas jealousy fears or resents losing something to another that we believe belongs to us. Covetousness is jealousy carried a step further. It is contemplating owning or taking possession of something that belongs to another and resenting the person who possesses what we want. The wrongfulness of taking (or even thinking of taking) something that belongs to another is intuitive and a violation
    of Torah but why, we may ask, does Scripture command us against envy, jealousy, and covetousness even when we do not bring harm to another? It is because we are to believe with conviction that God has given us that which He wants us to have, and we are therefore to be content with what we have. The Apostle Sha’ul is clear about it in Philippians 4:11 where he wrote: “Not that I am saying this to call attention to any need of mine; since, as far as I am concerned, I have learned to be content regardless of circumstances.” And in Hebrews 13:5, he also wrote: “Keep your lives free from the love of money; and be satisfied with what you have; for God himself has said, "I will never fail you or abandon you." Dissatisfaction that results in envy or jealousy is therefore dissatisfaction with God who is the giver of what we have, which is, of course, wrong and a sin.'
  commentary_juster: ''
