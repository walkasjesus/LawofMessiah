- id: DA19
  title: Not Associating with a Sexually Immoral Brother
  commandment: We are not to associate with a sexually immoral brother.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah is a sub-commandment of #DA74 that we not associate with a supposed brother believer who is committing immoral sin ( 1 Corinthians 5:11) . Not associating (i.e., not fellowshipping) with people who call themselves believers while continuing to engage in serious (especially moral) sins is sometimes referred to as “shunning.” There are three reasons for shunning such people: (1) continuing our association with them encourages a continuation of their sinful behavior; (2) continuing our association with them reflects badly on the body of believers by appearing to condone their sin; and (3) continuing our association with them puts us in danger of being tempted and possibly becoming embroiled in their sin. Notwithstanding the above, there are two caveats that need to be remembered: (1) This Mitzvah applies to people calling themselves believers – not to unbelievers. If we stop associating with unbelievers, we cannot witness God’s Word to them; we do, however,
    need to put restrictions on the ways that we associate with unbelievers, lest we be identified with their sin and even tempted to sin ourselves. (2) This Mitzvah assumes that a supposed believer from whom we are disassociating is not repentant and is continuing to sin; we must be prepared and willing to receive the person back in fellowship if and when he or she repents.'
  commentary_juster: ''
