  title: Keeping Free from, and Purifying Ourselves from Things that Defile
  commandment: We are to keep free from, and purify ourselves from, things that defile.
  commandment_subtitles:
  - id: AA15A
    commandment: We are to keep free from things that defile
  - id: AA15B
    commandment: We are to purify ourselves from things that defile
  commentary_rudolph: People and things can be defiled. When something is defiled, it is made impure or unclean, and therefore unsuitable for its intended use. In Scripture, its meaning is to make a thing or a person unclean and unholy, i.e., unsuitable for ministry or for entering the Tabernacle (later the Temple). In Scripture, the defilement of a person occurs when a person either sins or comes into contact with an unclean or prohibited object or substance. There are, however, exceptions. In the Mosaic Covenant, a woman was made unclean for a short time after giving birth – presumably due to its association with blood and the temporary unhealed condition of her body. She was not, however, referred to as defiled. Similarly, a person with bodily sores was considered unclean but not defiled. For purposes of this Mitzvah (and in the New Covenant), defilement is understood to be the result of sin. We are therefore commanded not to sin in the first place, to repent when we do, and to keep away
    from people, things, and situations that would tempt us to spiritual uncleanliness.
  commentary_juster: ''
