- id: BA30
  title: Not Lying to God
  commandment: We are not to lie to God.
  commandment_subtitles: []
  commentary_rudolph: The Bible has much to say about God’s abhorrence of lying, but Acts 5:1-10 is the only passage of Scripture about lying to God; all the others are about lying to people. In a way, that makes sense because how can one lye (withhold truth) from God who is all knowing and can read men’s minds? We know from the Scripture that Ananias and Sapphira lied to Peter, but it is puzzling of how it was even possible for them to lie to God. The answer may lie in verse 9 in which Peter chastises Sapphira for plotting (presumably with Ananias) to test the Holy Spirit – i.e. to see if the Holy Spirit lied to them about God’s requirement that they bring all of the proceeds of the sale of their property to the emissaries. Similar to how Adam and Eve (who were in a personal relationship with God) believed Satan that nothing bad would come of their eating from the forbidden tree, Ananias and Sapphira (presumably followers of Yeshua) likewise believed Satan to the extent that they were willing
    to test the Holy Spirit’s veracity, and this may have constituted blasphemy of the Holy Spirit that we are warned against in Matthew 12:31-32 .
  commentary_juster: ''
