  commandment: We are to abide in (stay united with) Yeshua in order to bear fruit.
  commandment_type: Positive
  commentary_rudolph: 'It is not possible for a man to bear no fruit at all. By merely being alive, man will bear either good fruit or bad fruit, and Scripture makes it plain that the choice is ours. Only good fruit results from our abiding in (being united with) Yeshua, and he is quoted to have said: " apart from me you can''t do a thing. " That is not to say that isolated instances of good fruit can never come from a person who is not united with Yeshua or that God cannot work His will through an unbeliever. However, Scripture is exhorting us that if we want to bear good fruit for God we must be (and remain) united with Yeshua, and then (and only then) will good fruit from us be assured.'
