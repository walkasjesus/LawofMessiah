  title: Comparing That Which is Taught Us to What We Read in Scripture
  commandment: We are to compare that which is taught us to what we read in Scripture.
  commandment_subtitles: []
  commentary_rudolph: We are to test everything we hear against Scripture. That means everything we hear from others and everything we think we are hearing from the Holy Spirit. This process of checking and comparing is what we call discernment, and it would be simple if the words of Scripture that were written centuries ago, and in contexts that no longer exist, were always easy to apply in today’s world and in our immediate circumstances. The fact is that we cannot be sure that we understand the Scriptures unless we seek and are sure that we are hearing the Holy Spirit’s interpretation. This puts us in a bind when what we are checking is whether we have heard the Holy Spirit correctly in the first place. The solution for this is not procedural – it is relational. We can only know that we are hearing the Holy Spirit correctly if we know the voice of the Holy Spirit (meaning God’s voice) well. If we do, then when we seek confirmation of something from the Scriptures, WE WILL KNOW WHEN WE
    KNOW THAT WE KNOW.
