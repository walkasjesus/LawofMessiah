  title: Comforting Our Neighbor
  commandment: We are to comfort our neighbor.
  commandment_subtitles: []
  commentary_rudolph: 'There are many Scriptures telling us that God is the source of our comfort, 2 Corinthians 1:3-4 being one of them: “Praised be God, Father of our Lord Yeshua the Messiah, compassionate Father, God of all encouragement and comfort; who encourages us in all our trials, so that we can encourage others in whatever trials they may be undergoing with the encouragement we ourselves have received from God.” Why, therefore, are there Scriptures that require that we comfort one another? It is because we are created in God’s image and are therefore to love our neighbor as God loves us and taught us how ( 1 John 4:19) . We live in a fallen world and are therefore subject to pain, anguish, disappointment, broken-heartedness, grief, and more. God wants us to overcome in the face of these, and He uses our comfort of each other as one of the ways that He empowers us to do so. The key Scripture supporting this Mitzvah speaks to counselors, but since comforting by sharing God’s word
    is the responsibility of all believers, the authors herein consider that Romans 12:8 is applicable to us all. Caveat One must be careful not to comfort another in a manner that endorses or enables the continuation of sinful behavior.'
