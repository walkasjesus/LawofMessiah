  title: Offering Our Entire Selves to God
  commandment: We are to offer our entire selves to God.
  commandment_subtitles: []
  commentary_rudolph: 'If our understanding of this Mitzvah combined with Luke 9:23 and Romans 6:22 is merely literal, we will conclude that God expects us to have no self-concerns or desires other than to give ourselves to him. As with most biblical interpretation, we can miss the meaning if we do not consider the Bible as a whole. Being God’s “slave” (as Romans 6:22 puts it) is not what God wants our relationship with him to be. That is made clear in Psalms 37:4 : “Trust in ADONAI, and do good; settle in the land, and feed on faithfulness. Then you will delight yourself in ADONAI, and he will give you your heart''s desire.” Of course, our heart’s desire must be consistent with God’s moral values and his will for us and for mankind. Psalms 126:2, Proverbs 10:28 , Proverbs 17:22, and Ecclesiastes 9:7 illustrate more of the lighter side of God’s will for us. One may notice that, in comparison to the New Testament, there are relatively few references in the Tanakh to offering ourselves to
    God; the Tanakh’s references to offerings are mostly to alter sacrifices. Nevertheless, giving ourselves to God is taught throughout the Tanakh using expressions such as “presenting ourselves,” “worshipping,” “bowing down,” “being in union with,” “following,” “serving,” “dedicating,” and “obeying.”'
