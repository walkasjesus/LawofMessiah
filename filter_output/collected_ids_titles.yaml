- id: AA52
  title: Not Being Rebellious towards God’s Authority
  commandment: We are not to rebel against God’s authority.
  commandment_subtitles: []
  commentary_rudolph: 'It is a surprise to some from reading 1 Samuel 15:23 to learn that “rebellion is like the sin of sorcery.” After all, the very founding of our country was achieved by rebelling against British rule, and we never thought of that as sinful. Later we learned from Romans 12:9 that we are to “recoil from what is evil,” which sounds very much like “rebelling” against evil, and that is certainly not sinful. The key to untangling what seem like contradictions is understanding that rebellion by itself is not sinful. Whether or not rebellion is sinful depends on what one is rebelling against. The context of 1 Samuel 15:2-23 is Sha’ul’s rebellion against God by rejecting His Word, and the context of 1 Timothy 1:9 is being “heedless of Torah ” and being “sinful, wicked and worldly” – hence the statement of this Mitzvah: “We are not to rebel against God’s authority.” Additional Comment by Daniel C. Juster Acts 5:29 tells us: “We must obey God, not men.” Consequently, we must rebel
    against human authority when it requires that we violate God’s law. The Revolutionary War was such a situation. The argument that was given at the time or the Revolution that the British were in rebellion against God’s natural laws is a hard sell in Britain even to this day.'
  commentary_juster: ''
