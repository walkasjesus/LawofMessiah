- id: H5
  commandment: We are not to conduct sacrifices of any kind apart from the Holy Temple.
  commandment_type: Negative
  commentary_rudolph: This Mitzvah is based on ones that Maimonides and HaChinuch wrote, limiting sacrifices to within the Sanctuary court. Their reason for highlighting this limitation was that the Israelites were to be reminded to not sacrifice to (or in the manner of) foreign Gods. This instruction is especially relevant in precluding our conducting sacrifices today at a time when there is no Holy Temple, but it gives no hint of whether sacrifices might be resumed if (and at such time as) the Temple is rebuilt, nor what kind of sacrifices they might be if it is. Clearly, with the sacrifice of Yeshua having occurred, they cannot be sacrifices for sin. The few Scriptures included herein that prohibit the use of unauthorized altars for sacrifice are but a sampling of many others that are in the Bible.
  classical_commentators: Maimonides and HaChinuch paraphrase closely the Scriptures upon which they rely, and Meir chose not to write a mitzvah on the subject.
