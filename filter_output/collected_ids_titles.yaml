- id: BA43
  title: Knowing that God is Triune
  commandment: We are to know that God is triune.
  commandment_subtitles: []
  commentary_rudolph: 'The triune nature of God (Father, Son, and Holy Spirit), sometimes referred to as the “Trinity,” is not described in the Bible in those very words, but it can be inferred from several Scriptures read together – most notably Matthew 28:18-19 . The tri-unity of God is not acknowledged in traditional (Rabbinical / Talmudic) Judaism and is controversial even in certain segments of Christianity. Some who believe that Yeshua (Jesus) is the Messiah, nevertheless, deny his deity. Others believe that Yeshua is all of God – i.e., the Father, Son, and Holy Spirit in one person. We call that belief “Jesus only.”  So far as I am aware, Messianic Judaism is entirely trinitarian in its belief that God is echad (a composite unity), existing as Father, Son, and Holy Spirit. While the three are integrally connected as “one” God, they are able to be at different places on earth (also in Heaven and on earth) at the same time, and can function separately but always cooperatively. For example,
    we read in Scripture that Yeshua (originally spirit in nature) walked on earth as a human being while, at the same time, the Holy Spirit impacted various individuals and, all the while, God the Father remained in Heaven. While the composite “oneness” of God may be difficult to comprehend, it is not unique in Scripture. The clearest example of it is in Genesis 2:24 (mirrored in Ephesians 5:31 ): Note that “ELOHIM” is a plural word meaning “God.” “ This is why a man is to leave his father and mother and stick with his wife, and they are to be one flesh .” Whereas they are one flesh, they are able to function separately and hopefully cooperatively. Although Yeshua’s Messiahship is not acknowledged within wider Judaism, the Holy Spirit’s ability to be (and function) on earth while God (presumably the Father) remains in Heaven is acknowledged. That notwithstanding, wider Judaism does not consider the Holy Spirit to be an entity or component of a composite God; rather, it considers him to
    be a kind of spiritual extension of God, and refers to him as “God’s Spirit” or “Spirit of God.” The term “ Ru’ach Ha-Kodesh ” (the Holy Spirit) is used in Psalms 51:13(11) in which David prays to God that he (David) is not taken away from God’s presence – that the Ru’ach Ha-Kodesh is not taken from him. The “ Ru’ach Ha-Kodesh ” is also referred to in Isaiah 63:10-11 in which the Holy Spirit is remembered to have been put among the Israelites by God during the time of Moses. Other times in Scripture, the Holy Spirit is referred to by terms such as the “ Shekinah Glory.” Such is the case in Exodus 24:16-18 in which the Shekinah Glory rested on the Tabernacle, and in Exodus 40:34-38 in which the Shekinah Glory filled the Tabernacle. (See Mitzvah #BA22 herein for a further discussion of God’s single and composite nature . )'
