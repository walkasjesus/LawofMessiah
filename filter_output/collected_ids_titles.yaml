- id: AA49
  title: Not Giving Ourselves to Sensuality
  commandment: We are not to give ourselves to sensuality.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah is similar to Mitzvah #GB60 in that passions and emotions are related to and part of sensuality. Sensuality is the enjoyment, expression or pursuit of things to do with our senses, i.e. feelings – especially feelings of pleasure, often sexual. 2 Corinthians 5:7 (NKJ) tells us that we “walk by faith and not by sight.” The “sight” referred to is not just eyesight; it is anything our bodies see, hear, smell, taste, feel, or otherwise detect and react to from external sources. There is a level to which such perceptions are normal and God-given, such as seeing danger and turning aside or feeling the pain of something hot and avoiding being burned. Those are not the kinds of “sensuality” that we are to avoid and, in fact, not all sensuality is to be avoided. Sexual pleasure is sensual, and when experienced appropriately within marriage is good and healthy. What this Mitzvah speaks against is “giving ourselves” to sensuality – i.e. allowing sensuality to rule
    us. The Apostle Paul could very well have said in 2 Corinthians 5:7: “For we walk by faith, not by sensuality.”'
