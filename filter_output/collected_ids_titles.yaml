  commandment: We may eat of crops with which we work, but not take any of it away, nor take to excess. If we lack a basic human need and our work involves providing it to others, we may partake of the product or service of our labor within the limits of survival but not of luxury.
  commandment_type: Negative
  commentary_rudolph: This Mitzvah is a form of charity known in the Jewish world as tz'dakah . It speaks to the worker directly, but implies a clear duty on the part of the owner of crops to allow his workers to eat of them while they are at work. One may argue that this also applies to those who work among food items which are not crops. For example, a restaurant worker may eat his fill during his or her work shift, but may not take any of it home. Also, because the Mitzvah is clearly one of compassion for the poor, in modern times it extends to industries that provide human necessaries other than edibles such as medical care, medicine, clothing basics, and fuel. It seems to me that if one hires an unshod shoe salesman, it is inhumane and a violation of 1 John 3:17 to require that he sell shoes while not equipping him with a pair of his own.
  classical_commentators: HaChinuch says that the root of mitzvah C576 is that Israelites are to have good character and exhibit good will. He is in basic agreement with Maimonides and Meir, and all three are very detailed regarding situations and exceptions. 1. Permission to eat at the end of work is a Talmudic interpretation.
