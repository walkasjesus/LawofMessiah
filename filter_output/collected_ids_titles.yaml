  title: Bearing One Another’s Burdens
  commandment: We are to bear one another’s burdens.
  commandment_subtitles: []
  commentary_rudolph: 'One might ask how this Mitzvah “bear one another’s burdens” squares with Galatians 6:5: “.. for each person will carry his own load. ” The answer is that the words translated “ burdens ” in Galatians 6:2 and “ load ” in Galatians 6:5 are different Greek words. The Greek word “ bare ” in Galatians 6:2 is something extremely heavy and burdensome, whereas the word “ phortion ” in Galatians 6:5 is a soldier’s pack of the kind that one person should be able to carry easily. Conceivably, the burdens referred to in this Mitzvah could apply to things physically heavy, but that is not its main intent. Its intent is for us to assist our fellow man as he encounters the various burdens of life. The New Testament Scriptures listed above illustrate this by exhorting us to be kind to one another, pray for one another, correct one another, serve each other’s needs, etc. Yeshua illustrated this in Luke 11:46 where he chastised the experts in law: " Woe to you Torah experts too! You
    load people down with burdens they can hardly bear, and you won''t lift a finger to help them! ” In our attempting to comply with this Mitzvah , we must remember that we cannot do it alone and must rely on God. Matthew 11:29-30 puts it this way: “ Take my yoke upon you and learn from me, because I am gentle and humble in heart, and you will find rest for your souls. For my yoke is easy, and my burden is light. "'
