- id: DA23
  title: Not Slandering or Giving False Testimony Against Our Neighbor
  commandment: We are not to slander or give false testimony against our neighbor.
  commandment_subtitles: []
  commentary_rudolph: This Mitzvah prohibits the conveying of untrue or false information about a person. Such conveyance can damage a person’s reputation and sometimes even his freedom or his life if given as false testimony in a court of law. There are several words often associated with this Mitzvah . “Slander” (also “backbiting”) as used by Bible translators means saying or writing something derogatory about a person that is untrue. Slander” that is knowingly spoken in a court of law is called “perjury,” and is itself unlawful. I say “knowingly,” because slanderous testimony given in error is not considered “perjury.” A word used in contemporary law but not used in Bible translations is “libel.” “Libel” is distinguished from “slander” in today’s jurisprudence in that “slander” is derogatory and untrue information about a person that is spoken, whereas “libel” is information of the same character that is written or otherwise conveyed in a form that has greater permanence and is therefore
    considered more damaging. “Libel” and “slander” are both “defamation” because both “unjustly” harm a person’s reputation. “ Lashon hara ” (evil tongue) is a rabbinical halachic term that is different from both “slander” and “libel” in that “ lashon hara ” is the spoken or written conveyance of derogatory information about a person regardless of whether the information is defamatory (i.e. true or untrue) and whether malevolent or innocent. “Gossip” is similar, except the information conveyed need not be derogatory. All of this is to say that we are not to defame or give false testimony against our neighbor regardless of what it is called.
