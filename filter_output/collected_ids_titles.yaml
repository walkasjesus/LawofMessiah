- id: BA57
  title: Coming to Yeshua for Spiritual Rest
  commandment: We are to come to Yeshua for spiritual rest.
  commandment_subtitles: []
  commentary_rudolph: 'There are several ways that Scripture speaks of coming to Yeshua. “Come to me,” in Matthew 11:28 is clear because it uses the word “come.” However, there are other ways that Scripture says it as well, e.g., believing in Yeshua, trusting in Yeshua, calling on Yeshua’s name, and others. There is a difference between believing in Yeshua and merely believing about him – that he is the Messiah. The important question about coming to Yeshua is: “Have we made him OUR Messiah?” To make him our Messiah, not only must we come to him; we must make him our Lord which means giving our lives over to him. Some rely on “what is known as the “Sinner’s Prayer” – a prayer that invites Yeshua into our hearts and asks him to save us. It works if we mean it and does not if we speak it legalistically as a mere formula of words. Resting in Yeshua means putting our cares upon him. There are two Christian poems and hymns that, in my opinion, capture the depth and emotion of coming to Yeshua
    and resting in him; the first is titled “Just as I Am;” 12 the first three stanzas are: Just as I am, without one plea But that Thy blood was shed for me And that Thou bid''st me come to thee O Lamb of God, I come, I come Just as I am, and waiting not To rid my soul of one dark blot, Words by Charlotte Elliott (1789-1871); original music composed by William B. Bradbury (1816-1868). To Thee whose blood can cleanse each spot, O Lamb of God, I come, I come. Just as I am, though tossed about With many a conflict, many a doubt, Fightings and fears within, without, O Lamb of God, I come, I come. The second is titled “What a Friend We Have in Jesus;” 13 the first three stanzas are: What a Friend we have in Jesus, all our sins and griefs to bear! What a privilege to carry everything to God in prayer! O what peace we often forfeit, O what needless pain we bear, All because we do not carry everything to God in prayer. Have we trials and temptations? Is there trouble anywhere? We should never be
    discouraged; take it to the Lord in prayer. Can we find a friend so faithful who will all our sorrows share? Jesus knows our every weakness; take it to the Lord in prayer. Are we weak and heavy laden, cumbered with a load of care? Precious Savior, still our refuge, take it to the Lord in prayer. Do your friends despise, forsake you? Take it to the Lord in prayer! In His arms He’ll take and shield you; you will find a solace there.'
  commentary_juster: ''
