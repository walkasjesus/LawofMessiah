- id: CA9
  title: Not Relying on Riches
  commandment: We are not to rely on riches.
  commandment_subtitles: []
  commentary_rudolph: 'Because humans are fragile, it is natural for us to have desires and want to be secure from the myriad of things that can beset us. Wanting security and fulfillment of our desires is not the usually the problem – in fact, God invites us to look to him and trust him for these things (see Mitzvah BA44). The problem is that too many of us do not trust God (whom we cannot see with natural eyes) and instead seek security and fulfillment from things we can see – chief among them being wealth (i.e., money and property). Are we hungry? Money can buy us food. Are we naked? Money can buy us clothing. Are we cold and wet? Money can buy us shelter. Are we in danger from others? Money can buy us protection and influence. All of these are logical and true to a point, but the right way to achieve them is through God. 2 Timothy 1:7 says: “For God has not given us a spirit of fear, but of power and of love and of a sound mind.” When we give in to fear and rely on our wealth instead
    of on God because we don’t trust that He will come through for us, we break covenant with God and commit sin.'
  commentary_juster: ''
