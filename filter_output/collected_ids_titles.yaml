  title: 'Abiding in the Vine: Being United (in Unity /Union) with God and Yeshua'
  commandment: We are to be united (in unity /union) with God and Yeshua.
  commandment_subtitles:
  - id: BA3A
    commandment: We are to abide in God and Yeshua
  - id: BA3B
    commandment: We are to be united (in unity /union) with God
  - id: BA3C
    commandment: We are to be united (in unity /union) with Yeshua
  commentary_rudolph: Yeshua describes himself as the vine, and “abiding” in him is more than living alongside him; it is allowing our lives to be merged with his. Scripture describes it as being in “unity” with him,” being “unified with him,” and being “in union” with him – expressions that are used interchangeably by the Bible translators. When applied to our relationship with God (including Yeshua and the Holy Spirit), Scripture calls us to be so “at one” with Yeshua and therefore with God that our views are his views, and what we say and do are those things he would have us say and do. The ultimate is our being able to say that we are “in” him. It is interesting that there are a plethora of Scriptures in the New Testament that speak of mankind achieving intimacy with God, but there are relatively few in the Tanakh. The probable reason is that prior to the New Covenant, ordinary Israelites did not have the same level of access to the Holy Spirit (designated leaders such as Abraham, Moses,
    and David did of course) and it is the Holy Spirit that enables us to “abide in Yeshua” and be in close union with God. Note that in Psalms 51:13(11), David begs God not to cast him away by taking the Holy Spirit from him.
