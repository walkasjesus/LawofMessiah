- id: AA51
  title: Aspiring to Be Blameless
  commandment: We are to aspire to be blameless.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah that is about being blameless is similar to the several Mitzvot listed above that direct us to be godly, holy, righteous, good, pure, decent, etc. In writing this volume we could have joined them into a single Mitzvah were it not for the fact that the Bible speaks of each separately. So, what is unique about being blameless, and how can Scripture direct us to aspire to blamelessness when at the same time Romans 3:22-32 tells us that “all have sinned and come short of earning God’s praise?” And how can David, the writer of Psalms 26:1 , tell God “I have lived a blameless life; unwaveringly” when the Bible reveals that he sinned by causing Uriah the Hittite’s death so he could continue his adulterous relationship with Uriah’s wife? These seeming inconsistencies can only be reconciled if being blameless is not synonymous with being sinless so, the question then becomes how can one say that one is (or has been) blameless after one has sinned? And how can one
    aspire to be blameless when it is almost certain that one will eventually sin? Some say that David wrote Psalms 26:1 before his sins involving Uriah and Bathsheba occurred. But David also wrote the following: Psalms 25:6-7 Remember your compassion and grace, ADONAI; for these are ages old. Don''t remember my youthful sins or transgressions; but remember me according to your grace for the sake of your goodness, ADONAI. Psalms 25:11 For the sake of your name, ADONAI, forgive my wickedness, great though it is. Psalms 25:18 See my affliction and suffering, and take all my sins away. Psalms 143:2 Don''t bring your servant to trial, since in your sight no one alive would be considered righteous. There can be only one answer; it is that when David repented of his sins he had prophetic incite and faith that God would somehow and one day “take all my sins away” ( Psalms 25:18) . We are in a much better position than David. If we, with faith in Yeshua repent of our sins, beg God for forgiveness,
    and receive Yeshua’s sacrifice as our own, we become as clean and blameless as if we had never sinned. Therefore, for us who are in the New Covenant, aspiring to be blameless is the same as aspiring to have faith in the cleansing blood of Yeshua.'
