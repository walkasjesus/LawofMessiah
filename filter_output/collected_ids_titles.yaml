- id: BA10
  title: Obeying the Commandments of God and Yeshua
  commandment: We are to obey the commandments of God and Yeshua.
  commandment_subtitles:
  - id: BA10A
    commandment: We are to obey the commandments (Mitzvot /Torah) of God
  - id: BA10B
    commandment: We are to obey the commandments (Mitzvot /Torah) of Yeshua
  commentary_rudolph: '(from Mitzvah #W8 of Volume 2) Christian theologians have often misinterpreted (and sometimes mistranslated) the Shaliach Paul’s writings to be saying that the mitzvot (commandments of the Torah ) – the laws – the statutes, ordinances, and judgments given at Mt. Sinai – were rendered uselessly obsolete by Yeshua. Those who hold that view teach that God’s law has been replaced by his grace, so that if we love God and one another, none of the specifics of the “Mosaic Law” matter anymore. 6 Such views are in direct contradiction of Yeshua’s words in Matthew 5:19 , which says: “So whoever disobeys the least of these mitzvot and teaches others to do so will be called the least in the Kingdom of Heaven. But whoever obeys them and so teaches will be called great in the Kingdom of Heaven.” Also problematic, is the mistranslation (of Matthew 5:17 of many Bible versions) of the Greek word “πληρῶσαι,” that is commonly but incorrectly rendered “fulfill:” Scriptures often cited
    to support this view include Romans 6:14 and 2 Corinthians 12:9 . “Do not think that I came to destroy the Law or the Prophets. I did not come to destroy but to fulfill.” (NKJ) The word in this context should actually be translated “fill” (the CJB translates it “complete”). These numerous mistranslations have fueled antinomians to teach that no part of God’s Law given at Mount Sinai is to be obeyed today because Yeshua fulfilled it in Himself. 7 There is another Scripture whose misunderstanding has caused no little amount of controversy, and that is Matthew 19:17, in which Yeshua tells a man: “But if you want to obtain eternal life, observe the mitzvot." Yeshua seems to be saying that salvation comes from a legalistic observance of the law, whereas we know from Galatians 2:16 (as well as other Scriptures) that: “.. a person is not declared righteous by God on the ground of his legalistic observance of Torah commands, but through the Messiah Yeshua''s trusting faithfulness.” The answer
    to this seeming contradiction is, of course, that Deuteronomy 18:15-19 of the Mosaic Torah prophesies the coming of Messiah Yeshua, and commands us to listen to him and obey him, as he will be speaking in God’s Name. So, to obey the Torah, is also to receive and obey the Mitzvot of Yeshua. A final word: This Mitzvah rests on my (and Daniel Juster’s) belief in the continued efficacy of all the Scriptures of the Torah ( 2 Timothy 3:16-17) , recognizing that we have to be led by the Ruach Hakodesh for their application in this New Covenant age. 8'
