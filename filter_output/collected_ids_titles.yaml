  commandment: We are not to deny our belief and faith in God & Yeshua.
  commandment_subtitles:
  - id: BA5A
    commandment: We are not to deny our belief and faith in God
  - id: BA5B
    commandment: We are not to deny our belief and faith in Yeshua
  commentary_rudolph: There are three ways that we can deny belief and faith in God and Yeshua. The most obvious and direct is through words stating our unbelief. It is of course understandable if we truly do not believe but, except in unusual circumstances, is sinful for one who does. Why might a believer deliberately conceal his or her belief? Perhaps to avoid persecution or even death in a hostile circumstance but, even then, God would have to approve the denial for it not to be counted as sin. Another way that we can deny our belief and faith is through silence – i.e., allowing others to continue in their incorrect assumption that we do not believe when in fact we do. What was said previously applies to this scenario as well. There is a third way that we can deny belief and faith, and that is by calling ourselves believers while allowing our conduct to violate God’s Word and standards. This is the most egregious way; it marks us as hypocrites and worse, misrepresents the values for which
    God and Yeshua stand. 4
