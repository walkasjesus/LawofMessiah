  commandment: We are test every spirit to see if it is from God.
  commandment_type: Positive
  commentary_rudolph: 'The assumption of Scripture is that professions, teachings, and exhortations of men are made in response to spirit influences that are either from God or from the adversary. If a spirit bringing a teaching is God''s Spirit, what he says will be true; if not, it will be false. We must therefore test the spirit of everything that is proffered to us so that we are not misled; 1 John 4:2-3 tells us how: Here is how you recognize the Spirit of God: every spirit which acknowledges that Yeshua the Messiah came as a human being is from God, and every spirit which does not acknowledge Yeshua is not from God - in fact, this is the spirit of the Anti-Messiah.'
