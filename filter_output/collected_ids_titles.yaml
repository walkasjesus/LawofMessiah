- id: BA42
  title: Partaking of Bread and Wine with Others & with a Pure Heart in Remembrance of Yeshua
  commandment: We are to partake of bread and wine with others and with a pure heart in remembrance of Yeshua.
  commandment_subtitles: []
  commentary_rudolph: 'Matzah is traditionally used at Passover meals ( sedarim ) to remember the unleavened bread the Israelites brought with them out of Egypt, and wine is traditionally used to represent the blood of the lamb that was sacrificed and placed on the doorposts of Israelites’ homes to save their firstborn sons from the angel of death.  The matzah eaten by Ashkenazic Jews at their sedarim represents the lamb that was consumed at the original Passover, whereas Sephardic Jews serve lamb as one of the Passover foods for the same reason. Bread and wine have been used as far back as Abraham as elements for sealing covenants. We read in Genesis 14:18-20: “Malki-Tzedek king of Shalem brought out bread and wine. He was cohen of El ''Elyon [God Most High], so he blessed him with these words: "Blessed be Avram by El ''Elyon, maker of heaven of earth and blessed be El ''Elyon, who handed your enemies over to you." Avram gave him a tenth of everything.” At his last seder, Yeshua used matzah
    and wine in an unusual way but in a way that was consistent with its historical covenantal meaning. We read in Matthew 26:26-28 : “While they were eating, Yeshua took a piece of matzah, made the b''rakhah, broke it, gave it to the talmidim and said, "Take! Eat! This is my body!" Also he took a cup of wine, made the b''rakhah, and gave it to them, saying, "All of you, drink from it! For this is my blood, which ratifies the New Covenant, my blood shed on behalf of many, so that they may have their sins forgiven.” We who are New Covenant believers in Yeshua understand this to be a sacrament intended for us today as well. We call it by various names such as “The Lord’s Table,” “Holy Communion,” “ Seudat Ha-Adon ,” etc., but how often and under what circumstances we are to take it is a matter of debate. It was during a Passover seder that Yeshua lifted the matzah and wine and is quoted in 1 Corinthians 11:24-25 t o have said: "This is my body, which is for you. Do this as a memorial to me";
    likewise also the cup after the meal, saying, "This cup is the New Covenant effected by my blood; do this, as often as you drink it, as a memorial to me." Some argue, therefore, that Yeshua meant for us to remember him with bread and wine only during Passover. Others argue that the words “as often as you drink it” mean any time we drink wine, and still others say it simply means “often.”'
