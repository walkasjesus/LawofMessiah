  commentary_rudolph: On its surface, this Mitzvah “Not Showing Favoritism” seems intuitive but can, on occasion, be misunderstood. First, favoritism applies to people –not to favorite foods, possessions, experiences, etc. Second, favoritism implies partiality that is improper such as promoting a less qualified person over one who is more highly qualified, in order to acquire some personal gain. When we favor one person over another for right reasons. we do not call it favoritism. If I, as a supervisor, favor one of my staff over another for a task for which he is especially well suited, that is good management – not favoritism. If I choose to spend more time with my son than with an unrelated person, that is good fathering – not favoritism. On the other hand, if I appoint my son to a position over a better qualified person merely because he is my son, that is showing favoritism. On the other hand (I think I have run out of hands), if the position is in a family- owned business in which
    everyone’s expectation is that my son is the heir apparent, then favoritism in my son’s behalf is both expected and appropriate, and this Mitzvah would not apply.
