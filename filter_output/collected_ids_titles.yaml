  commandment: We are forbidden to afflict our wife by withholding food, clothing, or marital rights.
  commandment_type: Positive
  commentary_rudolph: It is clear from the totality of the Scriptures (and especially from the New Covenant Scriptures), that the overarching commandment is for men to love their wives. The particulars of this Mitzvah in singling out food, clothing, and marital (conjugal sexual) rights is forced upon us because it is treated that way by the classical commentators, and we felt that we should respond accordingly. Many Scriptures address men but are clearly applicable to both men and women. We understand that wives are to love their husbands but the responsibility of this Mitzvah is directed specifically to husbands.
  classical_commentators: Maimonides, Meir, and HaChinuch use Exodus 21:9-10 to support their mitzvot that we must not withhold food, clothing, or marital rights from our wives. The context of the Scripture that they use to support their mitzvot is that of a wife who was previously a slave, marries her master, and the master subsequently marries for a second time when his first wife no longer pleases him.
