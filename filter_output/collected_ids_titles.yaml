- id: BA50
  title: Believing that Yeshua was Sent for All of Humanity
  commandment: We are to believe that Yeshua was sent for all of humanity.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah is a direct refutation of the Calvinist doctrine of predestination. In “The Institutes of the Christian Religion,” John Calvin wrote: (Translated from French) “By predestination we mean the eternal decree of God, by which he determined with himself whatever he wished to happen with regard to every man. All are not created on equal terms, but some are preordained to eternal life, others to eternal damnation; and, accordingly, as each has been created for one or other of these ends, we say that he has been predestinated to life or to death.” Calvin taught that Yeshua’s atoning sacrifice was not available to all, but only to an elect who were preordained to be saved. Why then, would Yeshua send his disciples out to “make people from all nations into talmidim, immersing them into the reality of the Father, the Son and the Ruach HaKodesh ..” ( Matthew 28:19 )? Why then, would the Bible tell us: “For God so loved the world that he gave his only and unique Son,
    so that everyone who trusts in him may have eternal life..” ( John 3:16) ? Scripture suggests that God can sovereignly select certain ones of us for special treatment and special assignments. We are not all Abraham, we are not all Moses, we are not all Sha’ul, and thank God we are not all Job. Nevertheless, the blessings brought by Yeshua are available to all of mankind equally.'
  commentary_juster: ''
