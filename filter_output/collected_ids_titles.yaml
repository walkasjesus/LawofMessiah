  title: Knowing God through Yeshua
  commandment: We are to know God through Yeshua.
  commandment_subtitles: []
  commentary_rudolph: 'There are two aspects to knowing God. The first is knowing about God – his attributes – what He is like. We can know him in that way through both Scripture and Yeshua because Yeshua and God the father are united, and Scripture tells us that “in him bodily, lives the fullness of all that God is.” ( Colossians 2:9) . The second aspect of knowing God is being in personal relationship with him – dialoguing with him – knowing him as a person. We can only know God that way through Yeshua, because God is a spirit being and Yeshua has been given the responsibility of connecting us to him through the Holy Spirit: “Yeshua said, "I AM the Way- and the Truth and the Life; no one comes to the Father except through me. Because you have known me, you will also know my Father; from now on, you do know him- in fact, you have seen him." ( John 14:6-7) . Those who knew God in the Old Testament knew him through Yeshua as well, though they were probably not aware of it and did not have
    the clarity of New Testament revelation.'
