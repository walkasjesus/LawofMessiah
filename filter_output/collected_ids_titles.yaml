  title: Not Looking Down on a Brother
  commandment: We are not to look down on a brother.
  commandment_subtitles: []
  commentary_rudolph: 'Looking down on others, as meant in this Mitzvah usually results from comparing ourselves to others and, with disrespect, concluding that we are superior or better. It is the sin of pride that is spoken against in the Mitzvot in category “EA. Humility & Pride,” infra. What this Mitzvah does not preclude is our observing the conduct of another, and objectively concluding that it can or should be improved or discontinued. The key Scriptures that support this Mitzvah refer to “brother” and not “neighbor” Yet, referring to Mitzvah #DA31 and Proverbs 14:21 : “He who despises his fellow sins, but he who shows compassion to the humble is happy.” The word in Hebrew translated “fellow” is so broad as to include our neighbor, regardless of our neighbor’s belief in God or Yeshua, and the word in Hebrew translated “despises” is similar to the words “looking down on” (“hates” in DA31). It is because of this Scripture and the commandment to “love your neighbor” in Matthew 22:39,
    that although this Mitzvah is about brothers, I believe the wider message of the Bible is to not look down on a “fellow human being.”'
