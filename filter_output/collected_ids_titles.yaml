  title: Not Deceiving Our Neighbor
  commandment: We are not to deceive our neighbor.
  commandment_subtitles: []
  commentary_rudolph: This Mitzvah , to not deceive our neighbor, is an obvious extension of the Mitzvah to love our neighbor. There are, nevertheless, exceptions; they are when deception is allowed or even used by God to achieve godly ends such as saving a life, testing us, or avoiding injustice. One such case is in Genesis 20:2 where, in order to protect his wife Sarah, Abraham lied to Avimelekh, telling him that Sarah was his sister. Another case is Joshua 2:1 (and verses following), where Y’hoshua son of Num secretly sent spies to inspect land in the vicinity of (and including) Yericho in order to determine if it was safe for the Israelites to go there. A third case is in 1 Samuel 19:13-17 where, in order to prevent Saul from killing David, Michal told Saul that David was sick, whereas the truth was that David had escaped and was fleeing. God warns us against spiritual deception, but He sometimes allows it in order to test us. Such was the case where God allowed Satan to tempt and deceive
    Eve, and Eve did likewise to Adam. They failed the test, and we are paying for it.
  commentary_juster: ''
