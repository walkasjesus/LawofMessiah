- id: A22
  commandment: We are not to allow worldly attractions to ensnare us.
  commandment_type: Negative
  commentary_rudolph: 'Yeshua prayed to his father in heaven: But now, I am coming to you; and I say these things while I am still in the world so that they may have my joy made complete in themselves. I have given them your word, and the world hated them, because they do not belong to the world - just as I myself do not belong to the world. I don''t ask you to take them out of the world, but to protect them from the Evil One. They do not belong to the world, just as I do not belong to the world. Set them apart for holiness by means of the truth - your word is truth. ( John 17:13-17 ) It is God''s will that we remain in the world so that we can bear witness to the lost - those who do not know God, and are in need of Messiah. We are nevertheless warned of a danger to us, which is that if we are not on our guard, we can allow ourselves to be ensnared by the things of the world that appeal to our flesh, and backslide into sin. The things of which we must beware are numerous - money, power,
    possessions, and illicit sex are but examples. We are not, however, left to fend for ourselves, for the Holy Spirit is with us, and we assured that: No temptation has seized you [us] beyond what people normally experience, and God can be trusted not to allow you [us] to be tempted beyond what you [we] can bear. On the contrary, along with the temptation he will also provide the way out, so that you [we] will be able to endure. ( 1 Corinthians 10:13-13 )'
