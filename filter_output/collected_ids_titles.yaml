  - id: BA2D
    commandment: We are to seek refreshment in the Holy Spirit
  - id: BA2E
    commandment: We are to seek renewal in Yeshua
  - id: BA2F
    commandment: We are to seek renewal in the Holy Spirit
  commentary_rudolph: 'The purpose of resting is to receive refreshment and renewal. Various Scriptures command us to rest from work weekly and annually on the various Sabbaths, and to rest our souls in God, Yeshua, and the Holy Spirit always. Because Yeshua and the Holy Spirit are echad with God the Father, this Mitzvah could well have had the title “Seeking Rest, Refreshment & Renewal in God.” However, because some Scriptures refer to Yeshua, some to the Holy Spirit, and some to God, the authors herein decided to focus this Mitzvah on Yeshua and the Holy Spirit, and to create a second Mitzvah #BA62 to discuss Scriptures that refer to God more broadly. “Rest,” “refreshment,” and “renewal” are related, but they are not the same and they can mean different things in different contexts. “Refreshment” means revitalization – giving fresh and renewed strength. It is a simple enough concept that applies to our bodies, souls, and spirits, so we will not discuss it further. “Rest” most commonly
    refers to the physical rest of our bodies that is needed for physiological “renewal.” The Scriptures that command we rest on the various Sabbaths include physical rest but point to a higher kind of rest and renewal as well – rest of our souls and spirits by surrendering ourselves to God and allowing Him to take our burdens and cares upon himself.'
