- id: DA44
  title: Not Being Indebted to Our Neighbor
  commandment: We are not to be indebted to our neighbor.
  commandment_subtitles: []
  commentary_rudolph: 'There are several ways that we can be indebted to another person – some financial and some non-financial. In early days, unpaid debts were generally paid by the debtor working off his debt as an indentured servant. A person who owed a debt was not free of his work obligation until the debt was paid. In the mid nineteenth century, debtor’s prisons substantially replaced the practice of indentured servitude in the western world, and today, while there are no longer debtor’s prisons, owing a debt that one cannot pay nevertheless results in a bondage of obligation that God does not want us to have. That is why Romans 13:8 instructs us: “Don''t owe anyone anything- except to love one another.” In today’s world, buying on credit for personal or business reasons is commonplace, which raises the question as to whether it is permissible for believers to borrow money or acquire property or services for which payment is deferred. The answer is complex because of the various kinds
    of loans and circumstances that exist. In general, I would say that collateralized loans are not biblically prohibited. Because the collateral is there to repay the loan should the lender not be able to repay it, a true debt (ie. an obligation without means of repayment) never really exists. I am of the opinion that, except for debt incurred in emergencies and for humanitarian reasons, unsecured debt with no clear means of repayment is what Romans 13:8 prohibits. The stated exception “to love one another” actually requires that we lend to people (especially to brothers) who are in need even when there is a risk of the loan not being repaid (see “Supportive Tanakh Scriptures” supra, and “Related Mitzvot in Volumes 1 & 2” infra). Typical of the kind of debt we are not to incur is that which is created by the elective use of credit cards where the borrower has no immediate means of repayment. Our desire to have things that are not necessary and that we cannot afford is what most often lures
    us into financial bondage, and is what Romans 13:8 is mostly speaking against.'
  commentary_juster: ''
