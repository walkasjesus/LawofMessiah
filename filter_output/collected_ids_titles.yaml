  title: Embracing Yeshua’s Sacrifice for Forgiveness, Righteousness, and Redemption
  commandment: We are to embrace Yeshua’s sacrifice for forgiveness, righteousness, and redemption.
  commandment_subtitles:
  - id: BA36A
    commandment: We are to embrace Yeshua’s sacrifice for forgiveness
  - id: BA36B
    commandment: We are to embrace Yeshua’s sacrifice for righteousness
  - id: BA36C
    commandment: We are to embrace Yeshua’s sacrifice for redemption
  commentary_rudolph: 'Redemption means receiving something back and, in the Bible, can mean receiving back land, animals, or people. Redemption in this Mitzvah refers to receiving us back and saving us from the disastrous consequence of our sins. It is not an exaggeration to say that Yeshua’s atoning sacrifice on the Roman stake was a ransom (a price) that he paid for our redemption – forgiveness for our sins, restoration to righteousness, and release from bondage of sin and death. Comment by Daniel C. Juster The verses supporting this Mitzvah are not in command form but, as in many cases, they are implied. They all support the idea of believing in Yeshua, and that means all the biblical truths about him. As Paul says in I Corinthians 15:3-5 : “For among the first things I passed on to you was what I also received, namely this: the Messiah died for our sins, in accordance with what the Tanakh says; and he was buried; and he was raised on the third day, in accordance with what the Tanakh
    says; and he was seen by Kefa, then by the Twelve;” It implies that we, similar to the Corinthians, are to believe that Yeshua died for our sins which, in turn, implies that we are to believe all else about him that Scripture reveals.'
  commentary_juster: ''
