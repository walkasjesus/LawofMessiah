  commandment_type: Negative
  commentary_rudolph: In the Scriptures that underlie this Mitzvah , "bread" represents ordinary food, and it also represents God's instructions to us (His words) that are delivered through the Scriptures (the Word of God) and through Messiah Yeshua who is said by Scripture to be God's Word and the "bread of life". Although couched in these symbolisms the plain meaning of this Mitzvah is that we are not to live only by that which sustains us physically, but also that which sustains us spiritually and brings us closer to God.
