- id: DA41
  title: Being Friends with Brothers & Friendly to Outsiders
  commandment: We are to continue in brotherly friendships but be friendly to neighbors and outsiders as well.
  commandment_subtitles:
  - id: DA41A
    commandment: We are be friends with brothers
  - id: DA41B
    commandment: We are to be friendly to our outsiders
  commentary_rudolph: 'Hebrews 13:1-2 distinguishes between having friendships with brothers and being friendly (hospitable) to outsiders. Friendship is covenantal and implies a deeper commitment to one another than just being friendly. Proverbs 18:24 says: “Some ‘friends’ pretend to be friends, but a true friend sticks closer than a brother.” One can, however, be friendly to a person who is a mere acquaintance – not a brother, not a friend, and one who is even an enemy. In my opinion, the Hebrews 13 requirement that we be friendly to outsiders should be understood to mean people outside of faith in the God of Abraham, Isaac, and Jacob. 2 Corinthians 6:14 says: “Do not yoke yourselves together in a team with unbelievers. For how can righteousness and lawlessness be partners? What fellowship does light have with darkness?” For that reason, some would say that the Hebrews 13 Scripture means that we cannot have friendships outside of faith in Yeshua and the New Testament. I am, however, of
    the opinion that, unlike the covenant of marriage, the biblical covenant of friendship can be achieved so long as both parties believe in, and adhere to, the principles taught in the Tanakh . Now, why the emphasis on being friendly to outsiders? It is because we are responsible for sharing the Good News of Yeshua to those who do not know him as Messiah and, without being friendly to outsiders, we cannot minister to people who are outside the faith. As for the reference in Hebrews 13 to entertaining angels, I believe it is referring to people who have been specially blessed to have had an encounter with God.'
