  title: Loving God & Yeshua
  commandment: We are to love the Lord Our God & Messiah Yeshua.
  commandment_subtitles:
  - id: BA21A
    commandment: We are to love the Lord our God
  - id: BA21B
    commandment: We are to love Messiah Yeshua
  commentary_rudolph: 'With Yeshua having now returned to Heaven, loving God the Father and Yeshua (also the Holy Spirit) are essentially the same. All three are people of God and spirit beings, and a question often raised is how we can love a spirit being. As in the case of Mitzvah DA24 (Loving Our Brother & Neighbor), the love we are commanded for God and Yeshua in the Greek New Testament is “ἀγαπήσε” (“ agape ”) and it is ָּ֥ וְ א ָֽ הַ בְ ת (“ v’ahavta, ”) for God in the Tanakh . This kind of love does not imply emotion or feeling, but rather sacrificial responsibility. In the case of our brother and neighbor, that responsibility is to do what is in their best interest, but in the case of God and Yeshua, it is to be obedient. Love and obedience are connected throughout the Scriptures, and never clearer than Yeshua’s words in John 14:15: “If you love me, you will keep my commands.” That notwithstanding, there is a relational component of loving God that must never be forgotten; it is
    having love for our Heavenly Father as we are his children.'
