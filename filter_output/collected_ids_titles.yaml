- id: BA61
  title: Continuing to Make Our Being Called & Chosen a Certainty
  commandment: We are to continue to make our being called and being chosen a certainty.
  commandment_subtitles: []
  commentary_rudolph: 'Being called and chosen are related but are not the same. Being called is being invited and being chosen is being selected. We read in Scripture that, throughout history, God chose various individuals to carry out his objectives. Some were chosen because they were godly and some because they were evil. Also, not all who were chosen were first called. Because of his evil nature, Judas Iscariot was chosen to be the betrayer of Yeshua; he was not called before he was chosen. Abraham, on the other hand, was first called and then chosen after being tested; we read in Hebrews 11:8: “By trusting, Avraham obeyed, after being called to go out to a place which God would give him as a possession; indeed, he went out without knowing where he was going.” He was tested in other ways as well and was subsequently chosen to become the “father of many nations” ( Genesis 17:3-8) . There are other examples in Scripture of people called and chosen, but the one that is the subject of this
    Mitzvah is mankind’s call to receive Yeshua as Lord and thereby be chosen to have eternal life. Matthew 22:14 (NKJ) tells us: “for many are called, but few are chosen." The call to receive Yeshua is to all of mankind, but Scripture both recognizes and prophesies that relatively few will heed the call, and therefore few will be chosen. Note that 2 Peter 1:10-11 is an exhortation to: “try even harder to make your being called and chosen a certainty.” It is a warning to believers that if they are not proactive in maintaining their faith they can, over time, backslide in their holiness and their obedience to God.'
