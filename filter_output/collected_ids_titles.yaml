  title: Seeking Rest and Refreshment in God
  commandment: We are to seek rest and refreshment in God.
  commandment_subtitles:
  - id: BA62A
    commandment: We are to seek rest in God
  - id: BA62B
    commandment: We are to seek refreshment in God
  commentary_rudolph: 'The purpose of resting is to receive refreshment and renewal. Various Scriptures command us to rest from work weekly and annually on the various Sabbaths, and to rest our souls in God always. Because Yeshua and the Holy Spirit are echad with God the Father, this Mitzvah could well have had the title of BA2: “Seeking Rest, Refreshment & Renewal in Yeshua and the Holy Spirit.” “Rest,” “refreshment,” and “renewal” are related, but they are not the same and they can mean different things in different contexts. “Refreshment” means revitalization – giving fresh and renewed strength. It is a simple enough concept that applies to our bodies, souls, and spirits, so we will not discuss it further. “Rest” most commonly refers to the physical rest of our bodies that is needed for physiological “renewal.” The Scriptures that command we rest on the various Sabbaths include physical rest but point to a higher kind of rest and renewal as well – rest of our souls and spirits by surrendering
    ourselves to God and allowing Him to take our burdens and cares upon himself.'
