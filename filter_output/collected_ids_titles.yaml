- id: Y6
  commandment: We are to follow Yeshua and put him before all else.
  commandment_type: Positive
  commentary_rudolph: 'For Yeshua to say that to follow him we must leave our homes and members of our family seems unreasonably extreme until we understand what he means. It is disclosed in Luke 18:22 in which Yeshua tells the young leader: There is one thing you still lack. Sell whatever you have, distribute the proceeds to the poor, and you will have riches in heaven. Then come, follow me! Verse 23 that follows tells the story: But when the man heard this, he became very sad, because he was very rich. For him giving up wealth was a requirement because he was enamored of his holdings to the extent that he gave it precedence over following Yeshua. For many of us, money may not be the hindrance; what each of us must give up or walk away from will be according to our own idolatries and excessive affections. What Yeshua is calling us to do, is to divest ourselves of everything and everyone that we care about more than we care about him. Were Yeshua a mere mortal, his insistence on this would
    be akin to human slavery and sinful. But Yeshua is not a mere mortal; " in him, bodily, lives the fullness of all that God is " ( Colossians 2:9 ), and he is God''s son. Although pursuing eternal life (salvation) is not commanded, it is the clear benefit and result of following Yeshua.'
