- id: AA7
  title: Seeking God’s Kingdom
  commandment: We are to seek the Kingdom of God.
  commandment_subtitles: []
  commentary_rudolph: The term “Kingdom of God” (in the NKJ) occurs throughout the New Testament, whereas “Kingdom of Heaven” occurs only in the Book of Matthew. Some make a distinction between them, but I do not because, in my view, God’s Kingdom is everywhere that God is. God the Father resides in Heaven and now (in the New Covenant) the Holy Spirit resides on earth – within “born-again” believers. It is therefore logical that God’s Kingdom is in both places as well. The commandment to “seek God’s Kingdom” is understood by some to mean merely that we should seek salvation – eternal life with God. That is correct, but its meaning is broader; it is to seek to be with God always – on earth during our lives, and in Heaven when we pass on. And it is not only to be with God (ie. in God’s presence), but to have a personal father/son/daughter relationship with Him wherever we are. One more thing. Matthew 6:33 exhorts us to not only to seek God’s Kingdom, but to seek it “first.” It is a reference
    to man’s tendency to be self-seeking in his quest for provisions. God promises us that if we make Him our priority we need not worry about providing for ourselves because He will meet all our needs.
  commentary_juster: ''
