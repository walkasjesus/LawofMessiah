- id: BA22
  title: Knowing that God is One – Both Singular & Composite
  commandment: We are to know that God is one – both singular and composite.
  commandment_subtitles: []
  commentary_rudolph: 'This Mitzvah addresses the word “one” as it applies to God in English translations of the Bible. There are three ways that the word “one” is used in the English Bible: the way it is not relevant in this Mitzvah is when it is referring to a person or people (e.g. “the other one” or “one must). The two ways that are relevant in this Mitzvah are (a) the singular number “1” as in a count of objects (e.g. “one widget”) and (b) the corporate word “one” meaning a collective as in “we are one in our purpose” (a single purpose held by multiple people) or “we are one band of men” (a single band consisting of multiple men). Similar to English where the word “one” can be used for either a singular or composite unity, the Hebrew Bible uses the word “ echad. ” Its use of “ echad ” in Deuteronomy 6:4 (“ Adonai echad, ”) is translated “the Lord is one” and is meant as a composite unity. When the Hebrew Bible intends to say that there is only one God (a singular unity), it may still
    use the word “ echad ,” so translators try to make it clear by using terms such as “only one,” “no other,” “You alone,” etc. The significance of the word “ echad ” as used in Deuteronomy 6:4 is that it allows for God to be triune (three in one) while still being one God and not three. See Mitzvah #BA43 herein for a discussion of God’s tri-unity.'
