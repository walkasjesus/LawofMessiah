- id: Y7
  commandment: We are to acknowledge God as our Supreme father, and Yeshua as our supreme rabbi, teacher, and leader.
  commandment_type: Positive
  commentary_rudolph: The Greek words used in Matthew 23:8-10 are for rabbi, for father, for teacher or leader. Since other Scriptures refer to our earthly fathers, teachers, and leaders, and since John does not object to being called "rabbi" in John 3:26 , Yeshua cannot be saying that we should not appropriately acknowledge our earthly fathers, teachers, leaders, and ordained rabbis. He is instead saying that we are to acknowledge our Father in heaven as our supreme father, and only him (Yeshua) as our supreme rabbi, teacher, & leader. The context is Yeshua criticizing Torah -teachers and the P'rushim who are using titles to elevate their stature, and doing things in public in order to be seen. This is a warning to us as well, to neither elevate our positions higher than we ought, nor approve or affirm others who may seek to do the same.
  classical_commentators: This Mitzvah is not addressed by any of the Jewish classical commentators.
  commentary_juster: Yeshua is warning us against gaining our identities through titles or other means that give an idolatrous level of honor to human beings.
