  title: Empathizing with the Imprisoned & Mistreated
  commandment: We are to empathize with those who are imprisoned and mistreated.
  commandment_subtitles: []
  commentary_rudolph: 'Scripture has much to say about prisoners and being imprisoned. 26 Some of the translations of Hebrews 13:3 (and other Scriptures) can be read as referring only to people in physical prisons, while others can be read to include people mistreated generally. It is especially so when one considers verses 1 and 2: “Let brotherly friendship continue; but don''t forget to be friendly to outsiders; for in so doing, some people, without knowing it, have entertained angels.” In other Scriptures such as Isaiah 61:1 , imprisonment refers to the spiritual bondage of sin that separates us from God: “The Spirit of Adonai ELOHIM is upon me, because ADONAI has anointed me to announce good news to the poor. He has sent me to heal the brokenhearted; to proclaim freedom to the captives, to let out into light those bound in the dark;” Yeshua spoke similarly in Luke 4:18-19 after reading from the Scroll of Isaiah: “The Spirit of ADONAI is upon me; therefore he has anointed me to announce
    Good News to the poor; he has sent me to proclaim freedom for the imprisoned and renewed sight for the blind, to release those who have been crushed, to proclaim a year of the favor of ADONAI.” Not only did Yeshua employ the Good News to free those who were spiritually imprisoned, but we read in Luke 9:1-6 that he sent his disciples out to do the same: “Calling together the Twelve, Yeshua gave them power and authority to expel all the demons and to cure diseases; and he sent them out to proclaim the Kingdom of God and to heal. He said to them, "Take nothing for your trip- neither a walking stick nor a pack, neither bread nor money; and don''t have two shirts. Whatever house you enter, stay there and go out from there. Wherever they don''t welcome you, shake the dust from your feet when you leave that Sometimes the word “captive” is used when meaning prisoner. town as a warning to them." They set out and went through village after village, healing and announcing the Good News everywhere.”
    Considering the application of these Scriptures to Hebrews 13:3 – yes, we are called to minister to prisoners in physical prisons, but considering the greater numbers of those who are imprisoned by their sin and by not knowing God and Yeshua, how much more are we, Yeshua’s latter day disciples, called to empathize with, and bring the Good News to, those who are spiritually imprisoned and headed for a sentence of death.'
