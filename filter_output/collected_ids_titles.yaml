  commandment: We are not to seek men's approval over God's.
  commandment_type: Negative
  commentary_rudolph: 'The un-regenerated man seeks man''s approval over God''s. It is a hold-over from the fall of mankind in the Garden of Eden. But Ephesians 4:22-24 instructs us: ... so far as your former way of life is concerned, you must strip off your old nature, because your old nature is thoroughly rotted by its deceptive desires; and you must let your spirits and minds keep being renewed, and clothe yourselves with the new nature created to be godly, which expresses itself in the righteousness and holiness that flow from the truth. It is not wrong to seek men''s approval so long as we put God''s approval first: 1 Peter 2:13-14 For the sake of the Lord, submit yourselves to every human authority - whether to the emperor as being supreme, or to governors as being sent by him to punish wrongdoers and praise those who do what is good.'
