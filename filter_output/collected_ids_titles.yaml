  commentary_rudolph: 'Faith and trust in God as translated in the Scriptures are synonymous, and in Hebrews 11:1-3 we read: “Trusting [faith] is being confident of what we hope for, convinced about things we do not see. It was for this that Scripture attested the merit of the people of old. By trusting [faith], we understand that the universe was created through a spoken word of God, so that what is seen did not come into being out of existing phenomena.” Also, Romans 10:17 says of faith: “So trust [faith]comes from what is heard, and what is heard comes through a word proclaimed about the Messiah.” (CJB) “So then faith comes by hearing, and hearing by the word of God. (NKJ) The “hearing” referred to in Romans 10:17 is through the Holy Spirit, and it can come prophetically or through inspired revelation of Scripture. What is most important about faith is that it is the way through which we relate to God; that is why Hebrews 11:6 tells us: “And without trusting [having faith], it is impossible
