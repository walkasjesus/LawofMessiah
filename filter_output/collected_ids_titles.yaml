- id: DA53
  title: Rescuing Our Neighbor
  commandment: We are to rescue our neighbor when rescue is needed.
  commandment_subtitles: []
  commentary_rudolph: 'From Volumes 1 and 2: “Do unto others as you would have them do unto you” is the well-known “golden rule,” but it does not appear in the Bible in that form. What is in the Bible is Mark 12:30-31 , which states: “.. and you are to love ADONAI your God with all your heart, with all your soul, with all your understanding and with all your strength.'' The second is this: ''You are to love your neighbor as yourself.'' There is no other mitzvah greater than these.” Applying that principle, Scripture teaches that we have a duty to help others, even to try to save the life of a person who is attacked. What is unclear is whether the duty applies even if it puts the protector in danger and, because Scripture is silent on the matter, I will not speculate. The parable of the “good Samaritan” is the classic Scripture that lauds assisting a person who has been attacked, but it is noteworthy that at no time was the “good Samaritan” in danger since he gave his help after the attack
    on the injured man had occurred. Nevertheless, he helped the stranger in need by spending his own time and money. Interestingly, some U.S. States have adopted what they call the “Good Samaritan Law” which does not require that a bystander help a person who is in distress, but states that if he does and causes injury in the process, he cannot be sued for his attempt.'
  commentary_juster: ''
