- id: G16
  commandment: We are to put God first in our priorities.
  commandment_type: Positive
  commentary_rudolph: If we understand that the "gods" in Exodus 20:3 are not only false deities, but rather all persons, matters, and things to which we "bow down" (i.e. put ahead of God and allow to control our lives), we understand how it is the quintessential Scripture that supports this Mitzvah . After that, Matthew 6:33 calls us to faith by exhorting us to " ... seek first his Kingdom and his righteousness, and all these things will be given to you as well. " It is telling us that, despite our perceived needs and natural inclination to dwell on them, if we put our attention on God instead of ourselves, He will see to it that our needs are met.
  classical_commentators: Maimonides, Meir, and HaChinuch interpret Exodus 20:3 as referring only to false deities. This Mitzvah is not, therefore, addressed by any of the Jewish classical commentators in the broader sense of putting God ahead of all other persons, matters, and things.
