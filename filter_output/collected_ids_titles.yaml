- id: DA52
  title: Behaving Wisely Toward Outsiders
  commandment: We are to behave wisely toward outsiders.
  commandment_subtitles: []
  commentary_rudolph: 'In the Tanakh , outsiders (also referred to as strangers or foreigners) were not merely Gentiles; they were Gentiles who lived outside the community of Israel. Gentiles who lived within the Community may have been gerim toshav (resident aliens or Tikkun’s terminology K’rovei Yisrael ). They were not considered outsiders, and could even partake of the Passover sacrifice if they were circumcised (Exodus 12:43-49 ). Under the Mosaic Covenant, outsiders had to be treated with love and respect, but Israelites did not have the same brotherly obligation of providing for their needs as they did for other Israelites, and could even lend to them at interest. Under the New Covenant, Gentile believers in Yeshua are grafted into the olive tree of Israel ( Romans 11:16-1 7) and are therefore brothers in the faith with Jewish believers; they are not considered outsiders even if they do not reside within a Jewish Community. This Mitzvah and Colossians 4: 5-6 instruct believers in
    Yeshua to act wisely in their contacts and conversations with outsiders (unbelievers) in order to make “full use of every opportunity.” The Scripture does not say to what opportunities it is referring, but we assume from the context that they are opportunities to share both God and Yeshua with unbelievers. The Scripture also does not indicate to what wise acts it is referring other than conversations, and rightfully so, because each encounter with an unbeliever presents its own challenges. Naturally, we must act civilly and lovingly, but we must also seek the Holy Spirit so that the Spirit’s wisdom becomes our wisdom.'
  commentary_juster: ''
