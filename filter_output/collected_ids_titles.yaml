- id: BA54
  title: Submitting to God
  commandment: We are to submit to God.
  commandment_subtitles: []
  commentary_rudolph: '“Submitting” and “obeying” are (for all practical purposes) synonymous but are treated separately in this compilation because the CJB uses both terms in its Bible translation (see Mitzvah BA10). Submitting to God requires: (1) knowing what God wants of us, and (2) complying with what God wants of us. There are two ways to know what God wants of us (this is beginning to sound like a lesson in mathematics): (a) knowing the Mitzvot contained in Scripture, and (b) hearing the voice of the Holy Spirit who directs us in applying the Mitzvot in the various circumstances of our lives. Knowing the Mitzvot is straight forward; it requires studying the Bible. Hearing the Holy Spirit is less so because it involves our growing in spiritual acuity and in our prayer relationship with God. But now we come to number (2) above – “complying.” Most believers – even new believers – become pretty good about knowing what God wants of us but have difficulty overcoming the obstacle of the
    flesh that tends to pull us in the other direction. This part of submitting to God is sometimes referred to as “dying to self” and is briefly dealt with elsewhere in this compilation.'
