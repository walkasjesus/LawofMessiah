- id: DA11
  title: Bearing the Weaknesses of Those Who Are Not Strong
  commandment: We are to bear the weaknesses of those who are not strong.
  commandment_subtitles: []
  commentary_rudolph: 'The meaning in Scripture of not being strong is not referring to muscular strength. It is referring to lack of spiritual strength – weakness of faith that results in sin and personal unfulfillment. One can also argue that Romans 15:1 applies to widows, orphans, and others who are not strong due to a handicap, disability, or circumstance. Supporting widows and orphans is the subject of Mitzvah BB3 in this compilation. This Mitzvah #DA11 instructs us to bear (i.e., carry – not bear with or condone) the weaknesses of those who are not spiritually strong or are handicapped with a disability; this means taking upon ourselves the weight (the responsibility) of ministering comfort, godly direction, and sometimes physical helps and provisions to such people provided, of course. they are willing to receive it. It is a weight on us because it is easier to avoid such people and their problems, and yet we are called to “love your neighbor as yourself” ( Matthew 22:39 ); in doing
    so, however, we must always remember that although we serve our fellow man, it is ultimately the Holy Spirit that helps us overcome our weaknesses ( Romans 8:26) . Related Mitzvot in Volumes 1 & 2 N01 Loving Our Neighbor, the Stranger, and Even Our Enemy N03 Helping Our Neighbor Who is in Need N09 Helping a Person Who Needs Rescue N11 Being Hospitable N14 Serving Our Neighbor N18 Being Compassionate & Merciful Toward Our Neighbor'
