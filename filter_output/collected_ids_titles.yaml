  commandment: We are to care for and not mistreat children.
  commandment_type: Negative
  commentary_rudolph: Generally, the statement of the Mitzvah speaks for itself, and the only controversy about it has to do with the administration of spankings. The well-known saying "spare the rod and spoil the child" is often mistakenly attributed to Scripture, but its origin is actually a 17 th century poem by Samuel Butler titled "Hudibras", which has nothing to do with Scripture. Nevertheless, Proverbs 13:24 and Proverbs 22:15 speak similarly, and have been the subject of law suits and prosecutions promulgated by some in our society who believe that spanking a child for correction is cruel and abusive. In oppositional response to that, much has been written on how to administer a spanking with love that is truly corrective.
  classical_commentators: This Mitzvah is not addressed by any of the classical Jewish commentators.
