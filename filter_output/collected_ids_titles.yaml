  commandment: We are to return an item we are holding in pledge when the owner is in need of it.
  commandment_type: Positive
  commentary_rudolph: Although historically commanded to Israelites concerning lending money to (and taking security from) other Israelites, compassion suggests that this Mitzvah be applied to everyone. It in fact raises the question of whether it is proper, in the first place, to take possession of any pledged object which is likely to be needed in the future. In modern times, it is unlikely that a person who is not in the pawn business will take security of chattel for a loan, and it is even less likely that chattel security would involve clothing. Yet, there might be a moral analogy if one takes possession of an item such as a person's tools if the tools are needed by him to earn a living.
  classical_commentators: Maimonides presents a more literal interpretation, requiring the pledged item to be returned during the day or night as needed. "Need", in this context, is on the level of survival, protection, earning capacity, health, and basic comfort. HaChinuch is consistent with Maimonides and Meir.
