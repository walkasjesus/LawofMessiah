  commentary_rudolph: This Mitzvah is among others that command obedience to the Word of God, and is self-explanatory from its supporting Scriptures. It is noteworthy that both the Deuteronomy 13 and Galatians 1 Scriptures anticipate and warn us against prophetic individuals who may appear to us (even with signs and wonders) and proclaim doctrines that are contrary to the written Word, and to the Apostles' interpretation of the written Word. We are not to listen to, follow, or even be hospitable to such individuals. This Mitzvah amplifies our need to test all prophetic words (even our own) against Scripture.
